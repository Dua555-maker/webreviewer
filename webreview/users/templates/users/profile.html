{% extends 'layout.html' %}

{% block title %}
{{title}}
{% endblock %}

{% block content %}

<div class="container text-center">
  <div class="row" style="margin-top: 120px;">
    <div class="col">
    </div>
    <div class="col">
    </div>
    <div class="col-4">
      <div class="container mt-3">
        <div class="card mt-3 mb-3">
          <div class="card-header">
            <h2>Profile Information</h2>
          </div>
          <div class="card-body">
              <div class="mb-3 text-start">
                <label for="username" class="form-label">Username</label>
                <input disabled value="{{user.username}}" type="text" class="form-control" id="username">
              </div>
              <div class="mb-3 text-start">
                <label for="email" class="form-label">Email</label>
               <input disabled value="{{user.email}}" type="email" class="form-control" id="email" required>
              </div>
              <div class="mb-3 text-start">
                <label for="password" class="form-label">Create At</label>
                <input disabled value="{{user.created_at.strftime("%d %b %Y, %H:%M UTC+0")}}" type="text" class="form-control" id="password">
              </div>
              <div class="mb-3 text-start">
                <label for="confirm_password" class="form-label">Review Counts</label>
                <input disabled value="{{user.review_count}}" type="text" class="form-control" id="confirm_password" required>
              </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
